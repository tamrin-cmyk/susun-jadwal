<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penyusun Jadwal SMKS Cordova Tebo DKV</title>
    <script>
      // Fix for environments, browser extensions, or platform-level wrappers that attempt to override/wrap window.fetch when it is read-only
      (function() {
        try {
          if (window.fetch) {
            let currentFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get() {
                return currentFetch;
              },
              set(newValue) {
                currentFetch = newValue;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Unable to define fetch getter/setter on window directly, trying prototype:', e);
          try {
            if (window.fetch) {
              let currentFetch = window.fetch;
              Object.defineProperty(Window.prototype, 'fetch', {
                get() {
                  return currentFetch;
                },
                set(newValue) {
                  currentFetch = newValue;
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e2) {
            console.warn('Unable to define fetch getter/setter on Window.prototype:', e2);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
