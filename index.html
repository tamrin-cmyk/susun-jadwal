    <script>
      // Fix for environments, browser extensions, or platform-level wrappers that attempt to override/wrap window.fetch when it is read-only
      try {
        if (window.fetch) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn('Unable to redefine window.fetch property descriptor:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
